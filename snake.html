<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="header.css">
  <title>CALOR SNAKE</title>
  <style>
    /* Windows 98/2000 Retro Style Window */
    .game-window {
      margin: 2rem auto;
      width: 95%;
      max-width: 550px;
      background-color: #c0c0c0;
      border: 3px solid #fff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      padding: 3px;
      box-shadow: 10px 10px 0 rgba(0,0,0,0.5);
      position: relative;
    }

    .game-title-bar {
      background: linear-gradient(90deg, #000080 0%, #1084d0 100%);
      color: #fff;
      padding: 4px 8px;
      font-family: 'Tahoma', sans-serif;
      font-weight: bold;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }

    .title-buttons {
      display: flex;
      gap: 2px;
    }

    .win-btn {
      width: 18px;
      height: 18px;
      background: #c0c0c0;
      border: 1px solid #fff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #000;
      cursor: pointer;
      font-weight: bold;
      font-family: 'Courier New', monospace;
    }

    /* The actual game area where the snake moves */
    .canvas-area {
      position: relative;
      width: 100%;
      max-width: 500px;
      aspect-ratio: 1 / 1;
      margin: 10px auto;
      border: 3px inset #808080;
      background-color: #000;
      overflow: hidden;
    }

    #gameBackground {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      filter: blur(2px) brightness(0.85);
      z-index: 0;
      transition: background-image 0.3s ease-in-out;
    }

    #gameCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: block;
      image-rendering: pixelated;
    }

    .score-board {
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 1.2rem;
      padding: 10px;
      color: #0f0;
      background: #000;
      border: 2px inset #808080;
      margin: 5px 10px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(3, 60px);
      gap: 15px;
      justify-content: center;
      margin: 1.5rem 0;
      /* Prevent scrolling when tapping controls */
      touch-action: manipulation;
    }

    .btn {
      width: 60px;
      height: 60px;
      background: #c0c0c0;
      border: 2px solid #fff;
      border-right-color: #404040;
      border-bottom-color: #404040;
      font-weight: bold;
      font-family: 'Tahoma', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      box-shadow: 2px 2px 0 #000;
      font-size: 1.5rem;
    }

    .btn:active {
      border: 2px solid #404040;
      border-right-color: #fff;
      border-bottom-color: #fff;
      transform: translate(1px, 1px);
      box-shadow: none;
    }

    .up { grid-column: 2; }
    .left { grid-column: 1; grid-row: 2; }
    .down { grid-column: 2; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }

    @media (min-width: 768px) {
      .controls { display: none; }
    }
  </style>
</head>
<body>

  <header>
    <div id="imageContainer"></div>
    <div class="flame-container">
      <img src="flame.gif" class="flame" alt="flame effect">
      <img src="flame.gif" class="flame" alt="flame effect">
      <img src="flame.gif" class="flame" alt="flame effect">
      <img src="flame.gif" class="flame" alt="flame effect">
      <img src="flame.gif" class="flame" alt="flame effect">
    </div>
    <div class="nav-container">
      <a href="archive.html" class="nav-arrow">‹‹‹</a>
      <h1>CALOR SNAKE</h1>
      <a href="index.html" class="nav-arrow">›››</a>
    </div>
    <button class="calorknopje" onclick="toggleChaos()">calorknopje</button>
  </header>

  <div class="game-window">
    <div class="game-title-bar">
      <span>Snake.exe</span>
      <div class="title-buttons">
        <div class="win-btn">_</div>
        <div class="win-btn">□</div>
        <div class="win-btn">X</div>
      </div>
    </div>
    
    <div class="score-board">SCORE: <span id="score">0</span></div>
    
    <div class="canvas-area">
        <div id="gameBackground"></div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
    </div>

    <div class="controls">
      <div class="btn up" data-dir="up">↑</div>
      <div class="btn left" data-dir="left">←</div>
      <div class="btn down" data-dir="down">↓</div>
      <div class="btn right" data-dir="right">→</div>
    </div>
    
    <p style="color: #000; padding: 10px; font-size: 0.8rem; text-align: center;">USE ARROW KEYS OR BUTTONS TO PLAY</p>
  </div>

  <footer class="social-media">
    <a href="https://www.instagram.com/calor.events/" target="_blank">Instagram</a>
  </footer>

  <script src="header-animation.js"></script>
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreElement = document.getElementById("score");
    const bgElement = document.getElementById("gameBackground");

    const gridSize = 40;
    const tileCount = canvas.width / gridSize;

    let score = 0;
    let dx = 0;
    let dy = 0;
    let snake = [
      { x: 5, y: 5 },
      { x: 5, y: 6 },
      { x: 5, y: 7 }
    ];

    // Assets
    const faceImages = [
      "pics/test 1.png", "pics/test 2.png", "pics/test 3.png",
      "pics/test 4 ctx.png", "pics/test 5 ctx.png", "pics/test 6 ctx.png",
      "pics/test 8 stan.png", "pics/test 10 pieter.png", "pics/test 7 cas.png"
    ];

    const sfxFiles = [
      "snake/sfx/alexis_gaming_cam-ding-cartoon-346093.mp3",
      "snake/sfx/ay-papiiiiiii.mp3",
      "snake/sfx/aye-papi.mp3",
      "snake/sfx/betoelguapillo-cartoon-eating-sound-effect-427528.mp3",
      "snake/sfx/cartoon 1-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon 2-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon 3-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon 4-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon 5-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon 6-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon 7-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon 8-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon 9-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon 10-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon 11-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon 12-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon 13-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon 14-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon 15-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon 16-Goofy_Cartoon_Sounds.mp3",
      "snake/sfx/cartoon.mp3",
      "snake/sfx/floraphonic-cartoon-yoink-1-183915.mp3",
      "snake/sfx/tmpz0t3th7g.mp3"
    ];

    const bgImages = Array.from({length: 52}, (_, i) => `snake/background/snake_${i+1}.jpg`);

    let loadedFaces = [];
    faceImages.forEach(src => {
      const img = new Image();
      img.src = src;
      loadedFaces.push(img);
    });

    const soundPool = sfxFiles.map(src => {
        const audio = new Audio(src);
        audio.preload = 'auto';
        return audio;
    });

    // Buffering Logic
    let nextSFX = null;
    let nextBG = null;
    const preloaderImg = new Image();

    function prepareNextAssets() {
      nextSFX = soundPool[Math.floor(Math.random() * soundPool.length)];
      if (nextSFX) nextSFX.load(); 

      nextBG = bgImages[Math.floor(Math.random() * bgImages.length)];
      preloaderImg.src = nextBG; 
    }

    // SILENT Audio Unlocker
    function unlockAudio() {
        soundPool.forEach(sound => {
            sound.muted = true; // Stay silent
            const p = sound.play();
            if (p !== undefined) {
                p.then(() => {
                    sound.pause();
                    sound.currentTime = 0;
                    sound.muted = false; // Ready for later
                }).catch(() => {});
            }
        });
        document.removeEventListener('click', unlockAudio);
        document.removeEventListener('touchstart', unlockAudio);
        document.removeEventListener('keydown', unlockAudio);
        console.log("Audio Unlocked Silently");
    }
    document.addEventListener('click', unlockAudio);
    document.addEventListener('touchstart', unlockAudio);
    document.addEventListener('keydown', unlockAudio);

    // Initial Preparation
    prepareNextAssets();
    const firstBG = nextBG;
    bgElement.style.backgroundImage = `url('${firstBG}')`;
    prepareNextAssets(); 

    let food = {
      x: Math.floor(Math.random() * tileCount),
      y: Math.floor(Math.random() * tileCount),
      img: loadedFaces[0]
    };

    function drawGame() {
      updateSnakePosition();
      
      const result = checkGameOver();
      if (result) {
        ctx.fillStyle = "white";
        ctx.font = "bold 40px Tahoma";
        ctx.shadowColor = "black";
        ctx.shadowBlur = 10;
        ctx.fillText("GAME OVER", canvas.width / 6.5, canvas.height / 2);
        ctx.font = "20px Tahoma";
        ctx.fillText("CLICK TO RESTART", canvas.width / 4, canvas.height / 2 + 40);
        ctx.shadowBlur = 0;
        return;
      }

      clearScreen();
      checkFoodCollision();
      drawFood();
      drawSnake();

      setTimeout(drawGame, 100);
    }

    function clearScreen() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(0, 0, 0, 0.35)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Scanlines
      ctx.fillStyle = "rgba(255, 255, 255, 0.04)";
      for(let i=0; i<canvas.height; i+=4) {
        ctx.fillRect(0, i, canvas.width, 1);
      }
    }

    function drawSnake() {
      for (let i = 0; i < snake.length; i++) {
        const part = snake[i];
        if (i === 0) {
          ctx.fillStyle = "#ffde00"; 
          ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize, gridSize);
          ctx.fillStyle = "red";
          ctx.fillRect(part.x * gridSize + 8, part.y * gridSize + 8, 8, 8);
          ctx.fillRect(part.x * gridSize + 24, part.y * gridSize + 8, 8, 8);
        } else {
          ctx.fillStyle = `rgba(255, 69, 0, ${1 - (i / snake.length)})`;
          ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 4, gridSize - 4);
        }
      }
    }

    function updateSnakePosition() {
      if (dx === 0 && dy === 0) return;

      let newX = snake[0].x + dx;
      let newY = snake[0].y + dy;

      if (newX < 0) newX = tileCount - 1;
      if (newX >= tileCount) newX = 0;
      if (newY < 0) newY = tileCount - 1;
      if (newY >= tileCount) newY = 0;

      const head = { x: newX, y: newY };
      snake.unshift(head);
      snake.pop();
    }

    function drawFood() {
      ctx.drawImage(food.img, food.x * gridSize, food.y * gridSize, gridSize, gridSize);
    }

    function checkFoodCollision() {
      if (food.x === snake[0].x && food.y === snake[0].y) {
        if (nextSFX) {
            try {
                const playClone = nextSFX.cloneNode();
                playClone.muted = false;
                playClone.play().catch(e => {
                    nextSFX.muted = false;
                    nextSFX.currentTime = 0;
                    nextSFX.play().catch(err => {});
                });
            } catch (e) {
                nextSFX.muted = false;
                nextSFX.currentTime = 0;
                nextSFX.play().catch(err => {});
            }
        }
        if (nextBG) {
            bgElement.style.backgroundImage = `url('${nextBG}')`;
        }

        food.x = Math.floor(Math.random() * tileCount);
        food.y = Math.floor(Math.random() * tileCount);
        food.img = loadedFaces[Math.floor(Math.random() * loadedFaces.length)];
        score++;
        scoreElement.innerHTML = score;
        
        const tail = { ...snake[snake.length - 1] };
        snake.push(tail);

        prepareNextAssets();
      }
    }

    function checkGameOver() {
      if (dx === 0 && dy === 0) return false;
      for (let i = 1; i < snake.length; i++) {
        if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
      }
      return false;
    }

    function changeDirection(dir) {
      if (dir === 'up' && dy !== 1) { dx = 0; dy = -1; }
      if (dir === 'down' && dy !== -1) { dx = 0; dy = 1; }
      if (dir === 'left' && dx !== 1) { dx = -1; dy = 0; }
      if (dir === 'right' && dx !== -1) { dx = 1; dy = 0; }
    }

    // Keyboard controls
    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowUp") changeDirection('up');
      if (e.key === "ArrowDown") changeDirection('down');
      if (e.key === "ArrowLeft") changeDirection('left');
      if (e.key === "ArrowRight") changeDirection('right');
    });

    // Mobile/Button controls (Removing 300ms delay)
    document.querySelectorAll('.btn').forEach(btn => {
      const handleInput = (e) => {
        e.preventDefault();
        const dir = btn.getAttribute('data-dir');
        changeDirection(dir);
      };
      
      btn.addEventListener('touchstart', handleInput, { passive: false });
      btn.addEventListener('mousedown', handleInput);
    });

    canvas.addEventListener("click", () => {
      if (checkGameOver()) {
        score = 0;
        scoreElement.innerHTML = score;
        snake = [{ x: 5, y: 5 }, { x: 5, y: 6 }, { x: 5, y: 7 }];
        dx = 0; dy = 0;
        prepareNextAssets();
        const resetBG = nextBG;
        bgElement.style.backgroundImage = `url('${resetBG}')`;
        prepareNextAssets();
        drawGame();
      }
    });

    drawGame();
  </script>
</body>
</html>
