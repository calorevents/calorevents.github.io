<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CALOR SHOP</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="../header.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Shop styles to match the WinXP intro boxes */
    .shop-container {
      margin: 2rem auto;
      width: 90%;
      max-width: 800px;
      background-color: #c0c0c0; /* WinXP window color */
      border: 2px solid #fff;
      border-right-color: #808080;
      border-bottom-color: #808080;
      padding: 1rem;
      color: #000;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.5);
    }
    .shop-header {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #000080 0%, #1084d0 100%);
      color: #fff;
      padding: 5px 10px;
      text-align: left;
    }
    .products {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-container">
      <a href="../index.html" class="nav-arrow">‹‹‹</a>
      <h1>CALOR SHOP</h1>
      <a href="../about.html" class="nav-arrow">›››</a>
    </div>
  </header>

  <div class="shop-container">
    <div class="shop-header">SJALOR, SHIRTS & MEER</div>
    <div class="products">
      <!-- Hero products (full-width, with description) -->
      <div id="product-sjaal"></div>
      <div id="product-shirt"></div>
      <!-- Grid products (2-up row) -->
      <div id="product-3"></div>
      <div id="product-4"></div>
    </div>
  </div>

  <script type="text/javascript">
  /*<![CDATA[*/
  (function () {
    var scriptURL = 'https://sdks.shopifycdn.com/buy-button/latest/buy-button-storefront.min.js';
    if (window.ShopifyBuy) {
      if (window.ShopifyBuy.UI) {
        ShopifyBuyInit();
      } else {
        loadScript();
      }
    } else {
      loadScript();
    }
    function loadScript() {
      var script = document.createElement('script');
      script.async = true;
      script.src = scriptURL;
      (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(script);
      script.onload = ShopifyBuyInit;
    }
    function ShopifyBuyInit() {
      var client = ShopifyBuy.buildClient({
        domain: 'bd79px-pr.myshopify.com',
        storefrontAccessToken: '2294c18d75b2a6d5aa5d0884eee70d3c',
      });

      var MONEY_FORMAT = '%E2%82%AC%7B%7Bamount_with_comma_separator%7D%7D';

      // Shared config reused across all four products
      var greenButton = {
        "font-size": "16px",
        "padding-top": "16px",
        "padding-bottom": "16px",
        ":hover": { "background-color": "#8ecd16" },
        "background-color": "#9ee418",
        ":focus": { "background-color": "#8ecd16" },
        "border-radius": "0px",
        "padding-left": "37px",
        "padding-right": "37px"
      };
      var quantityInput = {
        "font-size": "16px",
        "padding-top": "16px",
        "padding-bottom": "16px"
      };
      var productSetConfig = {
        "styles": {
          "products": {
            "@media (min-width: 601px)": { "margin-left": "-20px" }
          }
        }
      };
      var modalProductConfig = {
        "contents": {
          "img": false,
          "imgWithCarousel": true,
          "button": false,
          "buttonWithQuantity": true
        },
        "styles": {
          "product": {
            "@media (min-width: 601px)": {
              "max-width": "100%",
              "margin-left": "0px",
              "margin-bottom": "0px"
            }
          },
          "button": greenButton,
          "quantityInput": quantityInput,
          "title": {
            "font-family": "Helvetica Neue, sans-serif",
            "font-weight": "bold",
            "font-size": "26px",
            "color": "#4c4c4c"
          },
          "price": {
            "font-family": "Helvetica Neue, sans-serif",
            "font-weight": "normal",
            "font-size": "18px",
            "color": "#4c4c4c"
          },
          "compareAt": {
            "font-family": "Helvetica Neue, sans-serif",
            "font-weight": "normal",
            "font-size": "15.3px",
            "color": "#4c4c4c"
          },
          "unitPrice": {
            "font-family": "Helvetica Neue, sans-serif",
            "font-weight": "normal",
            "font-size": "15.3px",
            "color": "#4c4c4c"
          }
        },
        "text": { "button": "Add to cart" }
      };
      var cartConfig = {
        "styles": {
          "button": {
            "font-size": "16px",
            "padding-top": "16px",
            "padding-bottom": "16px",
            ":hover": { "background-color": "#8ecd16" },
            "background-color": "#9ee418",
            ":focus": { "background-color": "#8ecd16" },
            "border-radius": "0px"
          }
        },
        "text": {
          "title": "Mand!",
          "total": "Dit kost vermoedelijk:",
          "empty": "",
          "notice": "Bezorge and korting are add ed at a check it out benede",
          "button": "Check it hier out",
          "noteDescription": "Wist je dat sjaal eigenlijk sjansen bij de waal betekent? Tot zondag 19 juli!"
        },
        "contents": { "note": true }
      };
      var toggleConfig = {
        "styles": {
          "toggle": {
            "background-color": "#9ee418",
            ":hover": { "background-color": "#8ecd16" },
            ":focus": { "background-color": "#8ecd16" }
          },
          "count": { "font-size": "16px" }
        }
      };

      ShopifyBuy.UI.onReady(client).then(function (ui) {
        // Hero products (full-width horizontal, with description): Sjaal + Shirts
        [
          { id: '15578418741578', node: 'product-sjaal' },
          { id: '15578424213834', node: 'product-shirt' }
        ].forEach(function (p) {
          ui.createComponent('product', {
            id: p.id,
            node: document.getElementById(p.node),
            moneyFormat: MONEY_FORMAT,
            options: {
              "product": {
                "styles": {
                  "product": {
                    "@media (min-width: 601px)": {
                      "max-width": "100%",
                      "margin-left": "0",
                      "margin-bottom": "50px"
                    },
                    "text-align": "left"
                  },
                  "title": { "font-size": "26px" },
                  "button": greenButton,
                  "quantityInput": quantityInput,
                  "price": { "font-size": "18px" },
                  "compareAt": { "font-size": "15.3px" },
                  "unitPrice": { "font-size": "15.3px" }
                },
                "layout": "horizontal",
                "contents": { "img": false, "imgWithCarousel": true, "description": true },
                "width": "100%",
                "text": { "button": "Add to cart" }
              },
              "productSet": productSetConfig,
              "modalProduct": modalProductConfig,
              "option": {},
              "cart": cartConfig,
              "toggle": toggleConfig
            }
          });
        });

        // Grid products (2-up row): 3rd product + sricirahhalor
        [
          { id: '15878657671498', node: 'product-3' },
          { id: '15878651543882', node: 'product-4' }
        ].forEach(function (p) {
          ui.createComponent('product', {
            id: p.id,
            node: document.getElementById(p.node),
            moneyFormat: MONEY_FORMAT,
            options: {
              "product": {
                "styles": {
                  "product": {
                    "@media (min-width: 601px)": {
                      "max-width": "calc(50% - 20px)",
                      "margin-left": "20px",
                      "margin-bottom": "50px"
                    }
                  },
                  "button": greenButton,
                  "quantityInput": quantityInput
                },
                "text": { "button": "Add to cart" }
              },
              "productSet": productSetConfig,
              "modalProduct": modalProductConfig,
              "option": {},
              "cart": cartConfig,
              "toggle": toggleConfig
            }
          });
        });
      });
    }
  })();
  /*]]>*/
  </script>
</body>
</html>
