    .shop-container {

    .shop-header {
      font-size: 1.5rem;
      margin-bottom: 1rem;
      background: linear-gradient(90deg, #000080 0%, #1084d0 100%);
      color: #fff;
      padding: 5px 10px;
      text-align: left;
    }
    .products {
      display: flex;
      flex-wrap: wrap;

                  }

              }
            },
